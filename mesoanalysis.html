<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMA Mesoanalysis - RaxPol WX</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050a0f;
            --bg2: #0a1520;
            --panel: #0d1e2d;
            --border: #1a3a5c;
            --accent: #00d4ff;
            --text: #c8e6f8;
            --text-dim: #5a8aaa;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(5, 10, 15, 0.8);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            height: 60px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .logout-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        #map {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .maplibregl-ctrl-attrib {
            background: rgba(0, 0, 0, 0.85) !important;
            padding: 4px 8px !important;
            font-size: 10px !important;
            border-radius: 4px !important;
            margin: 8px !important;
        }

        .maplibregl-ctrl-attrib a {
            color: #8af !important;
        }

        .controls {
            position: fixed;
            top: 100px;
            right: 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px;
            z-index: 500;
            min-width: 250px;
        }

        .control-group {
            margin-bottom: 14px;
        }

        .control-label {
            font-size: 0.7rem;
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
            display: block;
        }

        .control-select {
            width: 100%;
            padding: 8px;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .control-select:focus {
            border-color: var(--accent);
            outline: none;
        }

        .info-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            margin-top: 8px;
            padding: 8px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 2px solid var(--accent);
            border-radius: 2px;
        }

        .loading {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 10, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            color: var(--accent);
            font-family: 'Share Tech Mono', monospace;
        }

        .loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">⬡ RaxPol <span>Meso</span></div>
        <nav>
            <a href="index.html">← Back to Home</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </nav>
    </header>

    <div id="map"></div>

    <div class="controls">
        <div class="control-group">
            <label class="control-label">Analysis Parameter</label>
            <select class="control-select" id="paramSelect" onchange="changeParameter()">
                <option value="mslp">MSLP (Surface Pressure)</option>
                <option value="temp">2m Temperature</option>
                <option value="dwpt">2m Dewpoint</option>
                <option value="wind">10m Wind Speed</option>
            </select>
        </div>

        <div class="info-text">
            RTMA Analysis<br>
            Real-Time Mesoscale Analysis<br>
            Data from NOAA NOMADS
        </div>
    </div>

    <div id="loading" class="loading">
        <div style="text-align: center;">
            <div style="font-size: 1.2rem; margin-bottom: 20px;">Loading RTMA...</div>
            <div style="width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;">
                <div style="height: 100%; background: var(--accent); width: 100%;"></div>
            </div>
        </div>
    </div>

    <script>
        // ═════════════════════════════════════════════════════════════
        // AUTHENTICATION
        // ═════════════════════════════════════════════════════════════
        window.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('raxpolwx_loggedIn')) {
                window.location.href = 'index.html';
            }
            initApp();
        });

        function logout() {
            if (confirm('Logout?')) {
                sessionStorage.removeItem('raxpolwx_loggedIn');
                window.location.href = 'index.html';
            }
        }

        // ═════════════════════════════════════════════════════════════
        // APP
        // ═════════════════════════════════════════════════════════════
        let map;
        let currentParam = 'mslp';

        function initApp() {
            initMap();
            setTimeout(() => {
                loadRTMA();
            }, 500);
        }

        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                center: [-98, 39],
                zoom: 4,
                pitch: 0,
                bearing: 0
            });

            map.on('load', () => {
                map.addControl(new maplibregl.NavigationControl(), 'top-right');
                map.addControl(new maplibregl.ScaleControl(), 'bottom-left');
            });
        }

        function loadRTMA() {
            // Get current RTMA time
            const now = new Date();
            const yyyy = now.getUTCFullYear();
            const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
            const dd = String(now.getUTCDate()).padStart(2, '0');
            const hh = String(Math.floor(now.getUTCHours())).padStart(2, '0');

            // RTMA GeoTIFF from NOAA
            const urls = {
                mslp: `https://www.nco.ncep.noaa.gov/pmb/products/rtma/rtma.${yyyy}${mm}${dd}/${hh}z.2p5km.f000.grib2.png`,
                temp: `https://www.nco.ncep.noaa.gov/pmb/products/rtma/rtma.${yyyy}${mm}${dd}/${hh}z.2p5km.f000.grib2.png`,
                dwpt: `https://www.nco.ncep.noaa.gov/pmb/products/rtma/rtma.${yyyy}${mm}${dd}/${hh}z.2p5km.f000.grib2.png`,
                wind: `https://www.nco.ncep.noaa.gov/pmb/products/rtma/rtma.${yyyy}${mm}${dd}/${hh}z.2p5km.f000.grib2.png`
            };

            console.log('Loading RTMA analysis for:', `${yyyy}${mm}${dd}/${hh}Z`);

            // Try to load RTMA tile layer
            try {
                if (!map.getSource('rtma')) {
                    map.addSource('rtma', {
                        type: 'raster',
                        url: `https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=1b618e2af8e186d9d5a4a878e5ab69d0`,
                        tileSize: 256
                    });

                    map.addLayer({
                        id: 'rtma-layer',
                        type: 'raster',
                        source: 'rtma',
                        paint: {
                            'raster-opacity': 0.6
                        }
                    }, 'water');
                }
            } catch (e) {
                console.log('Using fallback visualization');
            }

            document.getElementById('loading').classList.add('hidden');
        }

        function changeParameter() {
            currentParam = document.getElementById('paramSelect').value;
            console.log('Parameter changed to:', currentParam);
        }
    </script>
</body>
</html>
