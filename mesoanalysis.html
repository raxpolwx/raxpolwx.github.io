<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesoanalysis - RaxPol WX</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #050a0f;
      --bg2: #0a1520;
      --panel: #0d1e2d;
      --border: #1a3a5c;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --accent3: #ff6b35;
      --text: #c8e6f8;
      --text-dim: #5a8aaa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(0, 255, 136, 0.03) 0%, transparent 40%),
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px);
      pointer-events: none;
      z-index: 0;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .login-box h2 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-box h2 span {
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      border-radius: 4px;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 212, 255, 0.05));
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .btn:hover {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .app-container {
      display: none;
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-container.active {
      display: flex;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 30px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      background: rgba(5, 10, 15, 0.8);
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    header h1 span {
      color: var(--accent);
    }

    nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    nav a:hover {
      color: var(--accent);
    }

    .logout-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .main-content {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    #map {
      flex: 1;
      background: linear-gradient(135deg, #0a1520 0%, #0d1e2d 100%);
      border: 1px solid var(--border);
    }

    .sidebar {
      width: 300px;
      background: rgba(13, 30, 45, 0.95);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
    }

    .sidebar-section {
      margin-bottom: 24px;
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
      padding-bottom: 8px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      display: block;
      font-size: 0.75rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .control-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .control-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.2);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 4px;
      transition: background 0.3s;
      font-size: 0.85rem;
    }

    .checkbox-item:hover {
      background: rgba(0, 212, 255, 0.08);
    }

    .checkbox-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .slider-label span:last-child {
      color: var(--accent);
      font-weight: 600;
    }

    .slider {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider::-webkit-slider-thumb:hover {
      background: var(--accent2);
    }

    .slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      transition: background 0.3s;
    }

    .slider::-moz-range-thumb:hover {
      background: var(--accent2);
    }

    .select-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .select-group select {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .select-group select:focus {
      border-color: var(--accent);
      outline: none;
    }

    .select-group select option {
      background: var(--panel);
      color: var(--text);
    }

    .disclaimer {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      padding: 12px;
      background: rgba(255, 107, 53, 0.05);
      border: 1px solid rgba(255, 107, 53, 0.2);
      border-radius: 4px;
      line-height: 1.4;
      margin-top: 20px;
    }

    /* Leaflet map customization */
    .leaflet-control {
      border: 1px solid var(--border);
      background: var(--panel) !important;
      border-radius: 4px;
    }

    .leaflet-control button {
      background: var(--bg2) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      width: 36px !important;
      height: 36px !important;
    }

    .leaflet-control button:hover {
      background: rgba(0, 212, 255, 0.2) !important;
    }

    /* Scrollbar styling */
    .sidebar::-webkit-scrollbar {
      width: 8px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 4px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>Meso<span>Analysis</span></h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="off" required>
        </div>
        <button type="submit" class="btn">⬡ Access</button>
      </form>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="app-container">
    <header>
      <h1>Meso<span>Analysis</span></h1>
      <nav>
        <a href="index.html">← Back to Home</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </nav>
    </header>

    <div class="main-content">
      <div id="map"></div>

      <div class="sidebar">
        <!-- Display Options -->
        <div class="sidebar-section">
          <div class="sidebar-title">Display Options</div>
          
          <div class="control-group">
            <label class="control-label">Base Layer</label>
            <div class="select-group">
              <select id="baseLayer" onchange="changeBaseLayer()">
                <option value="osm">OpenStreetMap</option>
                <option value="satellite">Satellite</option>
                <option value="terrain">Terrain</option>
              </select>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">Map Opacity</label>
            <div class="slider-group">
              <div class="slider-label">
                <span>Opacity</span>
                <span id="opacityValue">100%</span>
              </div>
              <input type="range" id="opacitySlider" class="slider" min="0" max="100" value="100" onchange="updateOpacity(this.value)">
            </div>
          </div>
        </div>

        <!-- Overlays -->
        <div class="sidebar-section">
          <div class="sidebar-title">Overlays</div>
          
          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" id="mslpCheck" checked onchange="toggleLayer('mslp')">
              <span>MSLP Contours</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="contourLabelsCheck" checked onchange="toggleLayer('labels')">
              <span>Contour Labels</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="500mbCheck" onchange="toggleLayer('500mb')">
              <span>500mb Analysis</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="windBarbs" onchange="toggleLayer('windbarbs')">
              <span>Surface Wind Barbs</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="freezingLine" onchange="toggleLayer('freezing')">
              <span>32°F Freezing Line</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="asosStations" onchange="toggleLayer('asos')">
              <span>ASOS Stations</span>
            </label>
          </div>
        </div>

        <!-- Thermodynamics -->
        <div class="sidebar-section">
          <div class="sidebar-title">Thermodynamics</div>
          
          <div class="control-group">
            <label class="control-label">Display Parameter</label>
            <div class="select-group">
              <select id="thermParameter" onchange="updateThermodynamics()">
                <option value="temp">Temperature</option>
                <option value="dewpoint">Dewpoint</option>
                <option value="tdspread">T-Td Spread</option>
                <option value="theta">Equivalent Theta</option>
                <option value="rh">Relative Humidity</option>
              </select>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">Contour Density</label>
            <div class="select-group">
              <select id="contourDensity" onchange="updateContourDensity()">
                <option value="0.5">0.5x (Sparse)</option>
                <option value="1" selected>1x (Normal)</option>
                <option value="1.5">1.5x (Dense)</option>
                <option value="2">2x (Very Dense)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Dynamics -->
        <div class="sidebar-section">
          <div class="sidebar-title">Dynamics</div>
          
          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" id="helicityCheck" onchange="toggleLayer('helicity')">
              <span>Helicity Analysis</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox" id="shearCheck" onchange="toggleLayer('shear')">
              <span>Wind Shear</span>
            </label>
          </div>
        </div>

        <!-- Data Source -->
        <div class="sidebar-section">
          <div class="sidebar-title">Data Source</div>
          
          <div class="control-group">
            <label class="control-label">Model</label>
            <div class="select-group">
              <select id="modelSelect" onchange="updateModel()">
                <option value="rap">RAP Model</option>
                <option value="nam">NAM Model</option>
                <option value="hrrr">HRRR Model</option>
                <option value="gfs">GFS Model</option>
              </select>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label">Valid Time</label>
            <input type="text" class="control-input" id="validTime" placeholder="YYYY-MM-DD HH:00 UTC" readonly>
          </div>
        </div>

        <!-- Disclaimer -->
        <div class="disclaimer">
          <strong>Disclaimer:</strong> This is not an official SPC/NOAA product. Data and calculations are derived from publicly available sources for educational and informational purposes only.
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const ACCOUNTS = {
      'admin': 'nexrad2024',
      'user': 'welcome123'
    };

    let map;
    let baseLayers = {};
    let overlayLayers = {};
    let currentBaseLayer = 'osm';

    // Check auth on load
    window.addEventListener('DOMContentLoaded', function() {
      if (sessionStorage.getItem('raxpolwx_loggedIn')) {
        showApp();
      } else {
        showLogin();
      }
      document.getElementById('username').focus();
    });

    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').classList.remove('active');
    }

    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').classList.add('active');
      initializeMap();
    }

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (ACCOUNTS[username] === password) {
        sessionStorage.setItem('raxpolwx_loggedIn', 'true');
        showApp();
      } else {
        alert('Invalid credentials');
        document.getElementById('password').value = '';
      }
    });

    function logout() {
      sessionStorage.removeItem('raxpolwx_loggedIn');
      window.location.href = 'index.html';
    }

    function initializeMap() {
      // Create map centered on CONUS
      map = L.map('map').setView([39.0, -98.0], 4);

      // Base layers
      baseLayers.osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);

      baseLayers.satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri',
        maxZoom: 19
      });

      baseLayers.terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenTopoMap',
        maxZoom: 17
      });

      // Placeholder overlay layers
      overlayLayers.mslp = L.tileLayer('https://example.com/mslp/{z}/{x}/{y}.png', {
        attribution: 'MSLP Data',
        opacity: 0.7,
        pane: 'overlayPane'
      });

      overlayLayers.wind = L.tileLayer('https://example.com/wind/{z}/{x}/{y}.png', {
        attribution: 'Wind Data',
        opacity: 0.6,
        pane: 'overlayPane'
      });

      // Add scale control
      L.control.scale().addTo(map);

      // Set current time
      updateValidTime();
    }

    function changeBaseLayer() {
      const selected = document.getElementById('baseLayer').value;
      
      // Remove current base layer
      map.removeLayer(baseLayers[currentBaseLayer]);
      
      // Add new base layer
      baseLayers[selected].addTo(map);
      currentBaseLayer = selected;
    }

    function updateOpacity(value) {
      document.getElementById('opacityValue').textContent = value + '%';
      // Apply opacity to all overlay layers
      Object.values(overlayLayers).forEach(layer => {
        if (layer.setOpacity) {
          layer.setOpacity(value / 100);
        }
      });
    }

    function toggleLayer(layerId) {
      // Implement layer toggling logic here
      console.log('Toggle layer:', layerId);
    }

    function updateThermodynamics() {
      const param = document.getElementById('thermParameter').value;
      console.log('Update thermodynamics:', param);
    }

    function updateContourDensity() {
      const density = document.getElementById('contourDensity').value;
      console.log('Update contour density:', density);
    }

    function updateModel() {
      const model = document.getElementById('modelSelect').value;
      console.log('Update model:', model);
      updateValidTime();
    }

    function updateValidTime() {
      const now = new Date();
      const year = now.getUTCFullYear();
      const month = String(now.getUTCMonth() + 1).padStart(2, '0');
      const day = String(now.getUTCDate()).padStart(2, '0');
      const hour = String(Math.floor(now.getUTCHours() / 3) * 3).padStart(2, '0');
      
      document.getElementById('validTime').value = `${year}-${month}-${day} ${hour}:00 UTC`;
    }
  </script>
</body>
</html>
