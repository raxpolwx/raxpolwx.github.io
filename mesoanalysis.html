<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMA Mesoanalysis - RaxPol WX</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050a0f;
            --bg2: #0a1520;
            --panel: #0d1e2d;
            --border: #1a3a5c;
            --accent: #00d4ff;
            --accent2: #00ff88;
            --text: #c8e6f8;
            --text-dim: #5a8aaa;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 20%, rgba(0, 255, 136, 0.03) 0%, transparent 40%),
                repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px);
            pointer-events: none;
            z-index: 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(5, 10, 15, 0.8);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            height: 60px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        nav {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .logout-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        #map {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .maplibregl-ctrl-attrib {
            background: rgba(0, 0, 0, 0.85) !important;
            padding: 4px 8px !important;
            font-size: 10px !important;
            border-radius: 4px !important;
            margin: 8px !important;
        }

        .maplibregl-ctrl-attrib a {
            color: #8af !important;
        }

        .loading {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 10, 15, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent);
        }

        .loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">⬡ RaxPol <span>Meso</span></div>
        <nav>
            <a href="index.html">← Back to Home</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </nav>
    </header>

    <div id="map"></div>
    <div id="loading" class="loading">
        <div style="text-align: center;">
            <div style="font-size: 1.2rem; margin-bottom: 20px;">Loading RTMA Data...</div>
            <div style="width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;">
                <div style="height: 100%; background: var(--accent); animation: progress 2s infinite;"></div>
            </div>
        </div>
        <style>
            @keyframes progress {
                0% { width: 0%; }
                100% { width: 100%; }
            }
        </style>
    </div>

    <script>
        // ═════════════════════════════════════════════════════════════
        // AUTHENTICATION
        // ═════════════════════════════════════════════════════════════
        window.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('raxpolwx_loggedIn')) {
                window.location.href = 'index.html';
            }
            initApp();
        });

        function logout() {
            if (confirm('Logout?')) {
                sessionStorage.removeItem('raxpolwx_loggedIn');
                window.location.href = 'index.html';
            }
        }

        // ═════════════════════════════════════════════════════════════
        // APP INITIALIZATION
        // ═════════════════════════════════════════════════════════════
        let map;

        function initApp() {
            initMap();
            loadRTMAData();
        }

        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
                center: [-98, 39],
                zoom: 4,
                pitch: 0,
                bearing: 0
            });

            map.on('load', () => {
                map.addControl(new maplibregl.NavigationControl(), 'top-right');
                map.addControl(new maplibregl.ScaleControl(), 'bottom-left');
            });
        }

        function loadRTMAData() {
            const now = new Date();
            const year = now.getUTCFullYear();
            const month = String(now.getUTCMonth() + 1).padStart(2, '0');
            const day = String(now.getUTCDate()).padStart(2, '0');
            const hour = String(Math.floor(now.getUTCHours())).padStart(2, '0');

            console.log(`Loading RTMA data for ${year}${month}${day}/${hour}Z`);
            
            // Simulate loading
            setTimeout(() => {
                renderMockRTMA();
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        }

        function renderMockRTMA() {
            if (!map || !map.getStyle()) return;

            // Generate mock MSLP data
            const bounds = { north: 50, south: 24, west: -125, east: -66 };
            const contours = generateContours(1000, 1020, 4);

            // Add contour source and layer
            if (!map.getSource('contours')) {
                const features = contours.map((value, idx) => ({
                    type: 'Feature',
                    properties: { value },
                    geometry: generateContourGeometry(value, bounds)
                }));

                map.addSource('contours', {
                    type: 'geojson',
                    data: {
                        type: 'FeatureCollection',
                        features
                    }
                });

                map.addLayer({
                    id: 'contours',
                    type: 'line',
                    source: 'contours',
                    paint: {
                        'line-color': '#00d4ff',
                        'line-width': 2,
                        'line-opacity': 0.7
                    }
                });

                map.addLayer({
                    id: 'contour-labels',
                    type: 'symbol',
                    source: 'contours',
                    layout: {
                        'text-field': ['get', 'value'],
                        'text-size': 12,
                        'text-font': ['Open Sans Regular']
                    },
                    paint: {
                        'text-color': '#00d4ff',
                        'text-halo-color': '#050a0f',
                        'text-halo-width': 1
                    }
                });
            }
        }

        function generateContours(min, max, interval) {
            const contours = [];
            for (let v = Math.ceil(min / interval) * interval; v <= max; v += interval) {
                contours.push(v);
            }
            return contours;
        }

        function generateContourGeometry(value, bounds) {
            // Generate a simple circular path representing a pressure contour
            const centerLat = (bounds.north + bounds.south) / 2;
            const centerLon = (bounds.west + bounds.east) / 2;
            const radius = 0.5 + (value - 1000) * 0.3; // Vary by pressure

            const coords = [];
            for (let i = 0; i <= 360; i += 10) {
                const rad = (i * Math.PI) / 180;
                const lat = centerLat + Math.sin(rad) * radius;
                const lon = centerLon + Math.cos(rad) * radius;
                coords.push([lon, lat]);
            }

            return {
                type: 'LineString',
                coordinates: coords
            };
        }
    </script>
</body>
</html>
