<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXRAD Archive</title>
</head>
<body>
<script>
  const accounts = { 'admin': 'nexrad2024', 'user': 'welcome123' };
  
  if (!sessionStorage.getItem('nexrad_loggedIn')) {
    const user = prompt('Username:', '');
    if (!user) { document.body.innerHTML = '<h1>Access Denied</h1>'; throw new Error(''); }
    const pass = prompt('Password:', '');
    if (accounts[user] === pass) {
      sessionStorage.setItem('nexrad_loggedIn', 'true');
      window.location.href = 'app-content.html';
    } else {
      document.body.innerHTML = '<h1>Invalid Login</h1>';
    }
  } else {
    window.location.href = 'app-content.html';
  }
</script>
</body>
</html>
