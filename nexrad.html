<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXRAD Archive Browser</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap');
    :root {
      --bg:#050a0f; --bg2:#0a1520; --panel:#0d1e2d; --border:#1a3a5c;
      --accent:#00d4ff; --accent2:#00ff88; --accent3:#ff6b35;
      --text:#c8e6f8; --text-dim:#5a8aaa;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:
      radial-gradient(circle at 15% 50%,rgba(0,212,255,.04) 0%,transparent 50%),
      radial-gradient(circle at 85% 20%,rgba(0,255,136,.03) 0%,transparent 40%),
      repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(0,212,255,.015) 60px,rgba(0,212,255,.015) 61px),
      repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,212,255,.015) 60px,rgba(0,212,255,.015) 61px);
      pointer-events:none;z-index:0}
    
    /* LOGIN SCREEN */
    .login-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      background: rgba(5, 10, 15, 0.95);
    }
    
    .login-box {
      background: #0d1e2d;
      border: 1px solid #1a3a5c;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 0 30px rgba(0,212,255,.2);
      width: 100%;
      max-width: 350px;
      position: relative;
    }
    
    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    }
    
    .login-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    
    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    
    .login-title span {
      color: #00d4ff;
    }
    
    .login-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.15em;
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: #0a1520;
      border: 1px solid #1a3a5c;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      border-radius: 4px;
      outline: none;
      transition: all 0.3s;
    }
    
    .form-group input:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 0 1px rgba(0,212,255,.2), inset 0 0 8px rgba(0,212,255,.05);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(0,212,255,.05));
      border: 1px solid #00d4ff;
      color: #00d4ff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      margin-top: 24px;
    }
    
    .login-btn:hover {
      box-shadow: 0 0 20px rgba(0,212,255,.2);
      border-color: #00e5ff;
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error-msg {
      color: #ff6b6b;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      margin-top: 12px;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 4px;
      display: none;
    }
    
    /* APP SCREEN */
    .app-container {
      display: none;
      position: relative;
      z-index: 1;
    }
    
    .container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 20px 60px}
    header{display:flex;align-items:center;gap:20px;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .radar-icon{width:52px;height:52px;flex-shrink:0}
    .radar-icon svg{width:100%;height:100%}
    .radar-ring{fill:none;stroke:var(--accent);stroke-width:1;animation:radar-pulse 3s ease-in-out infinite}
    .radar-ring:nth-child(2){animation-delay:-1s;stroke-opacity:.6}
    .radar-ring:nth-child(3){animation-delay:-2s;stroke-opacity:.3}
    .radar-sweep-line{stroke:var(--accent2);stroke-width:1.5;transform-origin:26px 26px;animation:sweep 4s linear infinite;filter:drop-shadow(0 0 4px var(--accent2))}
    @keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes radar-pulse{0%,100%{stroke-opacity:.8}50%{stroke-opacity:.2}}
    .header-text h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;letter-spacing:.1em;color:#fff;text-transform:uppercase;line-height:1}
    .header-text h1 span{color:var(--accent)}
    .header-text p{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim);letter-spacing:.15em;margin-top:4px}
    .status-badge{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--accent2);background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);padding:6px 14px;border-radius:2px;display:flex;align-items:center;gap:8px}
    .status-dot{width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:blink 1.5s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-container">
    <div class="login-box">
      <div class="login-logo">⬡</div>
      <h2 class="login-title">NEXRAD <span>ARCHIVE</span></h2>
      <p class="login-subtitle">Login Required</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="off" required>
        </div>
        
        <button type="submit" class="login-btn">⬡ Login</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="app-container"></div>

  <script>
    // CREDENTIALS
    const ACCOUNTS = {
      'admin': 'nexrad2024',
      'user': 'welcome123'
    };

    // CHECK IF ALREADY LOGGED IN
    window.addEventListener('DOMContentLoaded', function() {
      if (sessionStorage.getItem('nexrad_loggedIn')) {
        showApp();
      } else {
        showLogin();
      }
    });

    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      document.getElementById('username').focus();
    }

    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      loadAppContent();
    }

    // HANDLE LOGIN
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      
      errorDiv.style.display = 'none';
      
      if (!username || !password) {
        errorDiv.textContent = 'Enter both username and password';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (ACCOUNTS[username] === password) {
        sessionStorage.setItem('nexrad_loggedIn', 'true');
        showApp();
      } else {
        errorDiv.textContent = 'Invalid username or password';
        errorDiv.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });

    // LOAD APP CONTENT
    function loadAppContent() {
      const appScreen = document.getElementById('appScreen');
      appScreen.innerHTML = getAppHTML();
      // Execute scripts from app
      executeAppScripts();
    }
    
    function getAppHTML() {
      return `<div class="container" id="appContainer"><!-- App content loaded --></div>`;
    }
    
    function executeAppScripts() {
      // Load the app content from iframe or direct injection
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = 'app-content.html';
      document.body.appendChild(iframe);
      
      iframe.onload = function() {
        try {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          const appHTML = iframeDoc.body.innerHTML;
          document.getElementById('appScreen').innerHTML = appHTML;
          
          // Copy over styles
          const styles = iframeDoc.querySelectorAll('style');
          styles.forEach(style => {
            const newStyle = document.createElement('style');
            newStyle.textContent = style.textContent;
            document.head.appendChild(newStyle);
          });
          
          // Execute scripts
          const scripts = iframeDoc.querySelectorAll('script');
          scripts.forEach(script => {
            const newScript = document.createElement('script');
            newScript.textContent = script.textContent;
            document.body.appendChild(newScript);
          });
        } catch (e) {
          console.error('Failed to load app content:', e);
        }
        iframe.remove();
      };
    }
  </script>
</body>
</html>
