<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXRAD Archive Browser — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #050a0f, #0a1520);
      color: #c8e6f8;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(0, 255, 136, 0.03) 0%, transparent 40%),
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px);
      pointer-events: none;
      z-index: 0;
      animation: drift 20s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(10px, -10px);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 24px;
    }

    .login-box {
      background: #0d1e2d;
      border: 1px solid #1a3a5c;
      border-radius: 8px;
      padding: 50px 45px;
      box-shadow: 
        0 0 30px rgba(0, 212, 255, 0.2),
        inset 0 0 40px rgba(0, 212, 255, 0.02);
      position: relative;
      overflow: hidden;
      margin: 0 auto;
      max-width: 450px;
      width: 100%;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, transparent);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.3));
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
      color: #fff;
    }

    h1 span {
      color: #00d4ff;
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: #5a8aaa;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .form-group:last-of-type {
      margin-bottom: 32px;
    }

    label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      color: #5a8aaa;
      text-transform: uppercase;
    }

    input {
      background: #0a1520;
      border: 1px solid #1a3a5c;
      color: #c8e6f8;
      padding: 14px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      border-radius: 4px;
      outline: none;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #3a5a7a;
    }

    input:focus {
      border-color: #00d4ff;
      box-shadow: 
        0 0 0 1px rgba(0, 212, 255, 0.3),
        inset 0 0 12px rgba(0, 212, 255, 0.08);
      background: #0f2535;
    }

    input:focus::placeholder {
      color: #5a8aaa;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 212, 255, 0.05));
      border: 1px solid #00d4ff;
      color: #00d4ff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(0, 212, 255, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    button:hover {
      border-color: #00e5ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    button:hover::before {
      opacity: 1;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      color: #ff6b6b;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 4px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    button.loading {
      pointer-events: none;
    }

    button.loading .spinner {
      display: block;
    }

    button.loading span {
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: #5a8aaa;
      letter-spacing: 0.1em;
    }

    .demo-info {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 212, 255, 0.1);
    }

    .demo-info p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: #5a8aaa;
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    .credentials {
      font-size: 0.6rem;
      color: #3a8aaa;
      margin-top: 8px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo-section">
        <div class="logo">
          <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
            <circle cx="26" cy="26" r="20" fill="none" stroke="#00d4ff" stroke-width="1"/>
            <circle cx="26" cy="26" r="14" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
            <circle cx="26" cy="26" r="8" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
            <line x1="26" y1="6" x2="26" y2="46" stroke="#00ff88" stroke-width="1.5" opacity="0.8" style="transform-origin: 26px 26px; animation: sweep 4s linear infinite;"/>
          </svg>
        </div>
        <h1>NEXRAD <span>ARCHIVE</span></h1>
        <p class="subtitle">⬡ Login Required</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username"
            placeholder="Enter username" 
            autocomplete="off"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Enter password" 
            autocomplete="off"
            required
          >
        </div>

        <button type="submit" id="loginBtn">
          <span>⬡ Login</span>
          <div class="spinner"></div>
        </button>

        <div class="error" id="error"></div>
      </form>

      <div class="demo-info">
        <p>Demo Accounts:</p>
        <div class="credentials">
          admin / nexrad2024<br>
          user / welcome123
        </div>
      </div>

      <div class="footer">
        NEXRAD Archive Browser v1.0
      </div>
    </div>
  </div>

  <script>
    const ACCOUNTS = {
      'admin': 'nexrad2024',
      'user': 'welcome123'
    };

    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('error');
    const loginBtn = document.getElementById('loginBtn');

    // Focus username on load
    window.addEventListener('load', () => {
      usernameInput.focus();
    });

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      // Clear previous errors
      errorDiv.style.display = 'none';
      errorDiv.textContent = '';

      // Validate inputs
      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      // Show loading state
      loginBtn.disabled = true;
      loginBtn.classList.add('loading');

      // Simulate network delay for security perception
      await new Promise(resolve => setTimeout(resolve, 500));

      // Check credentials
      if (ACCOUNTS[username] === password) {
        // Success
        sessionStorage.setItem('nexrad_loggedIn', 'true');
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        
        // Redirect to main page
        window.location.href = 'index.html';
      } else {
        // Failure
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
        showError('Invalid username or password. Please try again.');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    // Handle Enter key on password field
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        form.dispatchEvent(new Event('submit'));
      }
    });

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    // Keyboard animation on the page
    const style = document.createElement('style');
    style.textContent = `
      @keyframes sweep {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
