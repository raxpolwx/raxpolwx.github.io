<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXRAD Archive</title>
</head>
<body style="background: #050a0f; color: #c8e6f8; font-family: Rajdhani, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
  <div style="text-align: center;">
    <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Loading...</h1>
  </div>

  <script>
    const isLoggedIn = sessionStorage.getItem('nexrad_loggedIn');
    if (isLoggedIn) {
      window.location.replace('app.html');
    } else {
      window.location.replace('login.html?t=' + Date.now());
    }
  </script>
</body>
</html>
