<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Upload - RaxPol WX</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050a0f;
      --bg2: #0a1520;
      --panel: #0d1e2d;
      --border: #1a3a5c;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --accent3: #ff6b35;
      --text: #c8e6f8;
      --text-dim: #5a8aaa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(0, 255, 136, 0.03) 0%, transparent 40%),
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(0, 212, 255, 0.015) 60px, rgba(0, 212, 255, 0.015) 61px);
      pointer-events: none;
      z-index: 0;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .login-box h2 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-box h2 span {
      color: var(--accent);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      border-radius: 4px;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 212, 255, 0.05));
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .btn:hover {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    header h1 span {
      color: var(--accent);
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    nav a:hover {
      color: var(--accent);
    }

    .upload-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 30px;
    }

    .panel-title {
      font-size: 0.7rem;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 4px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }

    .upload-zone.dragover {
      border-color: var(--accent2);
      background: rgba(0, 255, 136, 0.08);
    }

    .upload-zone p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    #fileInput {
      display: none;
    }

    .datasets-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
    }

    .dataset-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      transition: background 0.3s;
    }

    .dataset-item:hover {
      background: rgba(0, 212, 255, 0.04);
    }

    .dataset-item:last-child {
      border-bottom: none;
    }

    .dataset-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .dataset-icon {
      font-size: 2rem;
      color: var(--accent);
    }

    .dataset-details h3 {
      font-size: 1rem;
      margin-bottom: 4px;
      color: var(--text);
    }

    .dataset-details p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .dataset-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .action-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
    }

    .empty-state p {
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .logout-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>Data <span>Upload</span></h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="off" required>
        </div>
        <button type="submit" class="btn">⬡ Access</button>
      </form>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" style="display: none;">
    <div class="container">
      <header>
        <h1>Data <span>Upload</span></h1>
        <div style="display: flex; gap: 20px; align-items: center;">
          <a href="index.html">← Back to Home</a>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </header>

      <!-- Upload Panel -->
      <div class="upload-panel">
        <div class="panel-title">// Upload Dataset</div>
        <div class="upload-zone" id="uploadZone">
          <p>📁 Drag files here or click to upload</p>
          <p style="font-size: 0.75rem; color: var(--text-dim);">Supports CSV, GeoJSON, NetCDF, and other data formats</p>
          <input type="file" id="fileInput" multiple>
        </div>
        <input type="text" id="datasetName" placeholder="Dataset name (optional)" style="width: 100%; padding: 10px; background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: 'Share Tech Mono', monospace; margin-bottom: 10px;">
        <button class="btn" onclick="uploadDataset()">⬡ Upload</button>
      </div>

      <!-- Datasets Panel -->
      <div class="datasets-panel">
        <div class="panel-title">// Uploaded Datasets</div>
        <div id="datasetsList"></div>
      </div>
    </div>
  </div>

  <script>
    const ACCOUNTS = {
      'admin': 'nexrad2024',
      'user': 'welcome123'
    };

    let selectedFiles = [];
    let datasets = JSON.parse(localStorage.getItem('datasets') || '[]');

    // Check auth on load
    window.addEventListener('DOMContentLoaded', function() {
      if (sessionStorage.getItem('uploads_loggedIn')) {
        showApp();
      } else {
        showLogin();
      }
      renderDatasets();
    });

    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      document.getElementById('username').focus();
    }

    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
    }

    // Login handler
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (ACCOUNTS[username] === password) {
        sessionStorage.setItem('uploads_loggedIn', 'true');
        showApp();
      } else {
        alert('Invalid credentials');
        document.getElementById('password').value = '';
      }
    });

    function logout() {
      sessionStorage.removeItem('uploads_loggedIn');
      location.reload();
    }

    // File upload handlers
    const uploadZone = document.getElementById('uploadZone');

    uploadZone.addEventListener('click', () => document.getElementById('fileInput').click());
    
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      selectedFiles = Array.from(e.dataTransfer.files);
      updateUploadUI();
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
      selectedFiles = Array.from(e.target.files);
      updateUploadUI();
    });

    function updateUploadUI() {
      if (selectedFiles.length > 0) {
        document.getElementById('uploadZone').innerHTML = `<p>✓ ${selectedFiles.length} file(s) ready to upload</p>`;
      }
    }

    function uploadDataset() {
      if (selectedFiles.length === 0) {
        alert('Please select files to upload');
        return;
      }

      const name = document.getElementById('datasetName').value.trim() || selectedFiles[0].name;
      const timestamp = new Date().toLocaleString();

      selectedFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataset = {
            id: Date.now(),
            name: name,
            filename: file.name,
            size: (file.size / 1024 / 1024).toFixed(2),
            timestamp: timestamp,
            data: e.target.result
          };
          datasets.push(dataset);
          localStorage.setItem('datasets', JSON.stringify(datasets));
          renderDatasets();
        };
        reader.readAsDataURL(file);
      });

      selectedFiles = [];
      document.getElementById('datasetName').value = '';
      document.getElementById('fileInput').value = '';
      document.getElementById('uploadZone').innerHTML = `<p>📁 Drag files here or click to upload</p><p style="font-size: 0.75rem; color: var(--text-dim);">Supports CSV, GeoJSON, NetCDF, and other data formats</p>`;
      alert('Dataset uploaded successfully!');
    }

    function renderDatasets() {
      const list = document.getElementById('datasetsList');
      
      if (datasets.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No datasets uploaded yet</p></div>';
        return;
      }

      list.innerHTML = datasets.map(ds => `
        <div class="dataset-item">
          <div class="dataset-info">
            <div class="dataset-icon">📊</div>
            <div class="dataset-details">
              <h3>${ds.name}</h3>
              <p>${ds.timestamp} • ${ds.size} MB</p>
            </div>
          </div>
          <div class="dataset-actions">
            <button class="action-btn" onclick="downloadDataset(${ds.id})" title="Download">⬇</button>
            <button class="action-btn" onclick="deleteDataset(${ds.id})" title="Delete">✕</button>
          </div>
        </div>
      `).join('');
    }

    function downloadDataset(id) {
      const ds = datasets.find(d => d.id === id);
      if (!ds) return;
      
      const link = document.createElement('a');
      link.href = ds.data;
      link.download = ds.filename;
      link.click();
    }

    function deleteDataset(id) {
      if (confirm('Delete this dataset?')) {
        datasets = datasets.filter(d => d.id !== id);
        localStorage.setItem('datasets', JSON.stringify(datasets));
        renderDatasets();
      }
    }
  </script>
</body>
</html>
